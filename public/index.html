<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeUA — Головна сторінка</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
    <div class="container header-content">
        <a href="index.html" class="logo-link">
            <div class="logo">Anime<span>UA</span></div>
        </a>

        <nav class="nav">
            <a href="index.html" class="active">Головна</a>
            <a href="#">Топ 100</a>
            <a href="#">Онгоїнги</a>
        </nav>

        <div class="search-box">
            <input type="text" placeholder="Пошук аніме..." id="anime-search">
            <button class="search-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </button>
        </div>

        <div class="user-menu">
            <div class="notifications">
                <span class="icon">🔔</span>
                <span id="notif-badge" class="badge" style="display: none;">0</span>
            </div>

            <button id="auth-btn" style="background: var(--accent-color, #ff4d4d); border: none; color: white; padding: 5px 15px; border-radius: 5px; cursor: pointer;">Увійти</button>

            <div class="profile-preview" style="cursor: pointer;">
    <img id="user-avatar" src="..." class="avatar">
    <span id="user-name">Нікнейм</span>
    
    <div class="dropdown-content">
        <a href="profile.html">Мій кабінет</a>
        <a href="admin.html">Адмін-панель</a>
        <hr>
        <a href="#" id="logout-btn" class="logout">Вихід</a>
    </div>
</div>
            </div>
        </div>
    </div>
</header>

<div id="auth-modal" class="modal" style="display: none;">
    <div class="modal-content">
        <span class="close-modal" style="cursor: pointer; float: right; font-size: 24px;">&times;</span>
        <h2 style="color: white; margin-bottom: 20px;">Вхід</h2>
        <button id="btn-google" style="width: 100%; padding: 10px; margin-bottom: 10px; cursor: pointer;">Увійти через Google</button>
        <div style="margin: 10px 0; color: #777;">або</div>
        <input type="email" id="auth-email" placeholder="Email" style="width: 100%; padding: 8px; margin-bottom: 10px;">
        <input type="password" id="auth-password" placeholder="Пароль" style="width: 100%; padding: 8px; margin-bottom: 10px;">
        <button id="btn-login-email" style="width: 100%; padding: 10px; margin-bottom: 5px; cursor: pointer;">Увійти</button>
        <button id="btn-register-email" style="width: 100%; padding: 10px; cursor: pointer;">Реєстрація</button>
    </div>
</div>

<main class="container">
    <h2 class="section-title">Останні оновлення</h2>
    <div class="anime-grid" id="main-anime-grid">
        </div>
</main>

<script type="module" src="script.js"></script>
</body>
</html>
