<main class="container">
    <div class="profile-container">
        <div class="profile-header-bar">ПРОФІЛЬ КОРИСТУВАЧА <span id="profile-title-name">...</span></div>
        
        <div class="profile-info-grid">
            <div class="profile-left-side">
                <div class="profile-avatar-container">
                    <img id="edit-avatar-preview" src="https://via.placeholder.com/100?text=?" alt="Avatar">
                    <div class="status-indicator online">ОНЛАЙН</div>
                </div>
                <button class="pm-btn">Написати ПП</button>
            </div>
            
            <div class="profile-right-side">
                <div class="info-row"><span>Група:</span> <p>Анімешник</p></div>
                <div class="info-row"><span>Ім'я:</span> <p id="info-display-name">...</p></div>
                <div class="info-row"><span>Реєстрація:</span> <p id="info-reg-date">...</p></div>
                <button id="toggle-edit-btn" class="edit-profile-trigger">Редагувати профіль</button>
            </div>
        </div>

        <div id="edit-section" class="edit-section" style="display: none;">
            <div class="profile-header-bar">РЕДАГУВАННЯ ПРОФІЛЮ</div>
            
            <div class="edit-form">
                <div class="edit-row">
                    <label>Ваше Ім'я:</label>
                    <input type="text" id="display-name-input">
                </div>
                
                <div class="edit-row">
                    <label>Аватар:</label>
                    <div class="file-upload-block">
                        <input type="file" id="avatar-file-input" accept="image/*">
                        <p class="file-note">JPG або PNG. Розмір 100x100px.</p>
                    </div>
                </div>

                <div class="edit-row">
                    <label>Про себе:</label>
                    <textarea id="bio-input"></textarea>
                </div>

                <button id="save-profile-btn" class="save-btn">Зберегти зміни</button>
            </div>
        </div>
    </div>
</main>
