<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель керування - AnimeUA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #7c3aed;
            --primary-hover: #6d28d9;
            --success: #10b981;
            --success-hover: #059669;
            --purple: #8b5cf6;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --input-bg: #0f172a;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        body { 
        display: none; /* Ховаємо сторінку за замовчуванням */
        background: var(--bg); 
        color: var(--text-main); 
        font-family: 'Inter', sans-serif; 
        padding: 40px 20px;
        line-height: 1.5;
        }

        h1 { font-weight: 700; margin-bottom: 30px; letter-spacing: -0.025em; font-size: 2.2rem; }
        h3 { font-size: 1.1rem; margin-top: 0; margin-bottom: 15px; color: var(--text-main); display: flex; align-items: center; gap: 10px; }

        .section { 
            background: var(--card-bg); 
            padding: 25px; 
            border-radius: 16px; 
            margin-bottom: 25px; 
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }

        input, textarea { 
            padding: 12px 16px; 
            border-radius: 10px; 
            border: 1px solid var(--border); 
            background: var(--input-bg); 
            color: white; 
            width: 100%; 
            box-sizing: border-box; 
            font-size: 14px;
            transition: all 0.2s;
        }

        input:focus, textarea:focus { 
            outline: none; 
            border-color: var(--primary); 
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.2);
        }

        button { 
            padding: 12px 20px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            cursor: pointer; 
            border-radius: 10px; 
            font-weight: 600; 
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.2s;
        }

        button:hover { background: var(--primary-hover); transform: translateY(-1px); }

        .search-results { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 15px; 
            margin-top: 10px;
        }

        .search-item { 
            text-align: center; 
            cursor: pointer; 
            background: var(--input-bg); 
            padding: 8px; 
            border-radius: 12px; 
            border: 1px solid transparent;
            transition: 0.3s;
        }

        .search-item img { border-radius: 8px; width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .search-item div { font-size: 11px; font-weight: 600; margin-top: 5px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; }

        .search-item:hover { border-color: var(--primary); transform: translateY(-5px); }

        form { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full-width { grid-column: 1 / -1; }

        .gen-box { 
            grid-column: 1 / -1;
            display: grid; 
            grid-template-columns: 2fr 1fr auto; 
            gap: 15px; 
            background: rgba(0,0,0,0.2); 
            padding: 20px; 
            border-radius: 12px; 
            border: 1px dashed var(--border);
        }

        label { font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; display: block; text-transform: uppercase; }

        .btn-publish {
            background: var(--success);
            font-size: 1.1rem;
            padding: 16px;
        }
        .btn-publish:hover { background: var(--success-hover); }
    </style>
</head>
<body>

    <h1>🛠 Панель керування</h1>

    <div class="section">
        <h3><span>🚀</span> Розумний пошук (MyAnimeList)</h3>
        <div class="input-group">
            <input type="text" id="mal-search" placeholder="Введіть назву англійською (напр. Naruto)">
            <button onclick="searchAnime()">🔍 Знайти</button>
        </div>
        <div id="search-results" class="search-results"></div>
    </div>

    <div class="section">
        <h3><span>📝</span> Додати аніме в базу</h3>
        <form id="main-anime-form">
            <div>
                <label>Назва українською</label>
                <input type="text" id="form-title" placeholder="Наприклад: Кайдзю №8" required>
            </div>
            <div>
                <label>Жанри</label>
                <input type="text" id="form-genres" placeholder="Екшн, Фантастика..." required>
            </div>
            
            <div class="full-width">
                <label>Посилання на постер (URL)</label>
                <input type="text" id="form-image" placeholder="https://..." required>
            </div>

            <div>
                <label>Кількість серій</label>
                <input type="text" id="form-episodes" placeholder="12 або Триває" required>
            </div>
            <div>
                <label>Студія</label>
                <input type="text" id="form-studio" placeholder="Production I.G" required>
            </div>

            <div class="gen-box">
                <div>
                    <label>Перша серія (URL)</label>
                    <input type="text" id="player-base-url" placeholder="https://.../1">
                </div>
                <div>
                    <label>К-сть серій</label>
                    <input type="number" id="episodes-count" placeholder="12">
                </div>
                <button type="button" onclick="generateEpisodes()" style="background: var(--purple);">⚙️ Генерирувати</button>
            </div>

            <div class="full-width">
                <label>Дані плеєра (JSON або одне посилання)</label>
                <textarea id="final-player-data" rows="5" placeholder="JSON згенерується автоматично" required></textarea>
            </div>

            <button type="submit" class="full-width btn-publish">💾 Опублікувати на сайті</button>
        </form>
    </div>

<script type="module">
    // 1. Імпортуємо потрібні функції (якщо вони не імпортовані раніше)
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

    // 2. Конфігурація (вона має бути такою ж, як у script.js)
    const firebaseConfig = {
        apiKey: "AIzaSyBRlTtULChSV0V8JlCRgzICqH6rR5neg4Y",
        authDomain: "animegensyua.firebaseapp.com",
        projectId: "animegensyua",
        storageBucket: "animegensyua.firebasestorage.app",
        messagingSenderId: "39273223584",
        appId: "1:39273223584:web:802054de3c260ed76440c5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // 3. Твоя перевірка
    onAuthStateChanged(auth, (user) => {
        const ADMIN_UID = "1mkKuWCJ5gQGOglP5L5JI5ueiB62";
        
        if (user && user.uid === ADMIN_UID) {
            console.log("Єсть пробітіє! Вітаю, Адмін.");
            document.body.style.display = "block"; // Показуємо контент
        } else {
            console.log("Доступ заборонено. Редирект...");
            window.location.href = "index.html";
        }
    });
</script>



    <script>
        // Переклад назв та жанрів
        async function translate(text) {
            try {
                const response = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|uk`);
                const data = await response.json();
                return data.responseData.translatedText;
            } catch (error) { return text; }
        }

        // Пошук через MyAnimeList (Jikan API)
        async function searchAnime() {
            const query = document.getElementById('mal-search').value;
            if (query.length < 3) return alert("Мінімум 3 символи");
            const resultsDiv = document.getElementById('search-results');
            resultsDiv.innerHTML = '<p style="text-align:center; grid-column:1/-1;">Шукаємо...</p>';

            try {
                const response = await fetch(`https://api.jikan.moe/v4/anime?q=${query}&limit=6`);
                const { data } = await response.json();
                resultsDiv.innerHTML = '';
                data.forEach(anime => {
                    const div = document.createElement('div');
                    div.className = 'search-item';
                    div.innerHTML = `<img src="${anime.images.jpg.image_url}"><div>${anime.title}</div>`;
                    div.onclick = async () => {
                        document.getElementById('form-title').value = "Завантаження...";
                        const uaTitle = await translate(anime.title_english || anime.title);
                        const uaGenres = await translate(anime.genres.map(g => g.name).join(', '));
                        
                        document.getElementById('form-title').value = uaTitle;
                        document.getElementById('form-genres').value = uaGenres;
                        document.getElementById('form-image').value = anime.images.jpg.large_image_url;
                        document.getElementById('form-episodes').value = anime.episodes || "Триває";
                        document.getElementById('form-studio').value = anime.studios[0]?.name || "Невідомо";
                    };
                    resultsDiv.appendChild(div);
                });
            } catch (e) { resultsDiv.innerHTML = 'Помилка API'; }
        }

        // Генератор JSON списку серій
        function generateEpisodes() {
            const baseUrl = document.getElementById('player-base-url').value;
            const count = parseInt(document.getElementById('episodes-count').value);
            if (!baseUrl || !count) return alert("Вкажіть дані");

            const lastSlash = baseUrl.lastIndexOf('/');
            const domain = baseUrl.substring(0, lastSlash + 1);
            let startId = parseInt(baseUrl.substring(lastSlash + 1));

            let eps = [];
            for (let i = 0; i < count; i++) {
                eps.push({ nr: i + 1, url: domain + (startId + i) });
            }
            document.getElementById('final-player-data').value = JSON.stringify(eps, null, 2);
        }

        // ВІДПРАВКА В БАЗУ ДАНИХ (SQLite)
        document.getElementById('main-anime-form').onsubmit = async (e) => {
            e.preventDefault();
            
            const formData = {
                title: document.getElementById('form-title').value,
                genres: document.getElementById('form-genres').value,
                image: document.getElementById('form-image').value,
                episodes: document.getElementById('form-episodes').value,
                studio: document.getElementById('form-studio').value,
                playerUrl: document.getElementById('final-player-data').value,
                year: "2024", 
                description: "Додано через адмін-панель."
            };

            try {
                const response = await fetch('/api/add-anime', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                if (response.ok) {
                    alert("✅ Аніме успішно додано в SQLite!");
                    document.getElementById('main-anime-form').reset();
                    document.getElementById('search-results').innerHTML = '';
                } else {
                    alert("❌ Помилка при збереженні");
                }
            } catch (err) {
                alert("❌ Сервер не відповідає");
            }
        };
    </script>
</body>
</html>
